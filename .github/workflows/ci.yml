name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: clang-format
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install tools
        run: pacman -Syu --noconfirm --needed git clang

      - uses: actions/checkout@v4

      - name: Check formatting
        run: |
          mapfile -d '' files < <(find src tests \( -name '*.cpp' -o -name '*.h' \) -print0)
          clang-format --dry-run -Werror "${files[@]}"

  build-debug:
    name: Build (debug)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git meson ninja pkgconf \
            wayland wayland-protocols \
            libglvnd gbm libdrm \
            cairo pango pangocairo pangoft2 \
            librsvg libxkbcommon pam util-linux

      - uses: actions/checkout@v4

      - name: Configure
        run: meson setup build-debug --buildtype=debug

      - name: Build and test
        run: |
          meson compile -C build-debug
          meson test -C build-debug --print-errorlogs

  build-release:
    name: Build (release)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git meson ninja pkgconf \
            wayland wayland-protocols \
            libglvnd gbm libdrm \
            cairo pango pangocairo pangoft2 \
            librsvg libxkbcommon pam util-linux

      - uses: actions/checkout@v4

      - name: Configure
        run: meson setup build-release --buildtype=release

      - name: Build
        run: meson compile -C build-release
